<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relay Pro | ILYJ Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-md flex justify-between items-center mt-6 mb-8">
        <div>
            <h1 class="text-2xl font-bold text-blue-600 tracking-tight">Relay Pro</h1>
            <p class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold">Powered by ILYJ v1.0</p>
        </div>
        <div class="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
            <span class="text-white font-bold text-xl">R</span>
        </div>
    </header>

    <main class="w-full max-w-md bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6">
            <div class="flex items-center justify-between mb-4">
                <span class="text-xs font-medium text-slate-500">Cloud Context Buffer</span>
                <span class="flex items-center text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full font-bold">
                    <span class="h-1.5 w-1.5 bg-emerald-500 rounded-full mr-1.5 animate-pulse"></span> SYNCED
                </span>
            </div>
            
            <textarea id="contextBox" 
                class="w-full h-56 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm text-slate-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none" 
                placeholder="Paste context here or pull from AI session..."></textarea>
            
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="push()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 active:scale-95 transition-all">
                    Push to Cloud
                </button>
                <button onclick="pull()" class="bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 rounded-2xl hover:bg-slate-50 active:scale-95 transition-all">
                    Pull Latest
                </button>
            </div>
        </div>
        
        <div class="bg-slate-50 border-t border-slate-100 p-4 flex justify-between items-center">
            <div class="text-xs text-slate-500">Account: <span class="text-slate-900 font-semibold underline cursor-pointer">Upgrade to Pro</span></div>
            <div class="text-[10px] text-slate-400 font-mono">ID: RELAY-4402</div>
        </div>
    </main>

    <footer class="mt-12 text-center">
        <p class="text-slate-400 text-xs">A gayboi-lab Production</p>
    </footer>

    <script>
        function push() {
            const text = document.getElementById('contextBox').value;
            if(!text) return alert("Context box is empty!");
            alert("Context pushed via ILYJ Protocol.");
        }
        function pull() {
            alert("Fetching latest context from Relay Cloud...");
        }
    </script>
</body>
</html>
